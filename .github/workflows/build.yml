name: mise build and push

on:
  workflow_dispatch:
  pull_request:
  push:

permissions:
  contents: write
  pull-requests: write
  issues: write
  deployments: write
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_EXPERIMENTAL: true
  GITHUB_TOKEN: ${{ github.token }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@main
      - uses: jdx/mise-action@main
        with:
          bootstrap: true
          cache_key: "mise-{{platform}}-{{version}}-{{file_hash}}"
      - run: mise run ci

