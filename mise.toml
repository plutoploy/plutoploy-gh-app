[tools]
biome = "latest"
node = "latest"
pnpm = "latest"

[env]
PORT = "3000"

[tasks]
install = "pnpm install"
webhook-deploy = "pnpm exec partykit deploy"
update = "pnpm update"
envpush = "pnpm exec partykit env push"
start = "pnpm run start"
ci = "mise oci build && mise oci push ghcr.io/${GITHUB_REPOSITORY}:latest"

[deps]
pnpm = { auto = true }

[settings]
experimental = true
github_attestations = true

[oci]
from = "docker.io/debian:latest"
tag = "${github.repo}:latest"
workdir = "/app"
entrypoint = ["bash", "-l"]
cmd = []
user = "nonroot"
user_id = 1000
group_id = 1000
mount_point = "/mise"
labels = { "org.opencontainers.image.source" = "https://github.com/${github.repo}" }
